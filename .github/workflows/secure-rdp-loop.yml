name: Secure RDP via Tailscale (Repo 3 - rpp)

on:
  workflow_dispatch:
    inputs:
      gh_api_token:
        description: "🔒 HASSAN | ENTER YOUR GITHUB PAT HERE"
        required: true
        default: ""

concurrency:
  group: rdp-loop-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 360
    steps:
      - name: 🔒 Executing Secured Core Engine (Windows Server 2025 - rpp)
        run: |
          $token = "${{ github.event.inputs.gh_api_token }}"
          if (-not $token -or -not ($token -match '^ghp_[a-zA-Z0-9]+$')) { Write-Error "❌ Invalid Token!"; exit 1 }
          
          # 📢 Protected Branding
          $u_enc = "aGFzc2Fu"; $p_enc = "SEBzc0FuMTIzNDU2"
          $u = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String([char[]]$u_enc))
          $p = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String([char[]]$p_enc))
          if ($u -ne "hassan") { exit 1 }
          
          # ⚙️ إنشاء وتثبيت حساب hassan كمسؤول
          $securePass = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) { 
              New-LocalUser -Name $u -Password $securePass -AccountNeverExpires | Out-Null 
          } else {
              Set-LocalUser -Name $u -Password $securePass
          }
          Add-LocalGroupMember -Group "Administrators" -Member $u -ErrorAction SilentlyContinue
          Set-LocalUser -Name $u -PasswordNeverExpires $true

          # 🔓 إعدادات تخطي الشاشة الزرقاء والدخول التلقائي المستقر
          $TSPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path $TSPath -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path $TSPath -Name "SecurityLayer" -Value 1 -Force
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse" -Value 0 -Force
          
          $CredPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if (-not (Test-Path $CredPath)) { New-Item -ItemType Directory -Path $CredPath -Force | Out-Null }
          Set-ItemProperty -Path $CredPath -Name "PromptForPasswordAsse" -Value 0 -Force
          Set-ItemProperty -Path $CredPath -Name "fPromptForPassword" -Value 0 -Force

          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 | Out-Null
          Restart-Service -Name TermService -Force
          
          # 🛡️ استثناء Antivirus
          Set-MpPreference -ExclusionPath "C:\" -ErrorAction SilentlyContinue

          # 📥 تحميل نسخة الواجهة الرسمية (GUI)
          Write-Host "📥 Downloading TraffMonetizer GUI Installer..."
          $tmPath = "C:\traffmonetizer.exe"
          & curl.exe -L -k -A "Mozilla/5.0" -o $tmPath "https://data.traffmonetizer.com/downloads/Traffmonetizer.exe"

          # 🎯 إنشاء ملف التوكن النصي على سطح المكتب العام لراحتك
          $targetToken = "lKi5PrDuezqIq9MEALffFER1bHT0kPImGRwgIreWGZs="
          $publicDesktop = "C:\Users\Public\Desktop"
          if (Test-Path $publicDesktop) {
              Set-Content -Path "$publicDesktop\TOKEN.txt" -Value $targetToken -Force
              Write-Host "✅ Token file written directly to Public Desktop."
          }

          # 🚀 التفعيل التلقائي الصامت لنسخة الواجهة وإعداد الإقلاع الذاتي لـ rpp
          if (Test-Path $tmPath) {
              Write-Host "⚙️ Registering token directly into system backend..."
              
              # حقن التوكن واسم الجهاز المخصص للمستودع الثالث ليعمل مباشرة أونلاين
              Start-Process -FilePath "C:\traffmonetizer.exe" -ArgumentList "start", "accept-offers", "--token", "$targetToken", "--name", "gh-runner-hassan-rpp" -WindowStyle Hidden -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2

              # سكربت الـ Startup لفتح الواجهة تلقائياً عند الدخول للـ RDP
              $startupFolder = "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
              $batContent = "@echo off`nstart C:\traffmonetizer.exe"
              Set-Content -Path "$startupFolder\launch_traff.bat" -Value $batContent -Encoding ASCII
              Write-Host "✅ Automatic Startup Launcher Armed."
          }

          # 🌐 تثبيت وتفعيل Tailscale
          Write-Host "🌐 Installing Tailscale via Choco..."
          choco install tailscale -y --no-progress | Out-Null
          $env:Path += ";C:\Program Files\Tailscale"
          
          Write-Host "🔄 Connecting to Tailscale Network..."
          # استخدام اسم Hostname فريد لـ rpp لتجنب تداخل السيرفرات في نفس الحساب
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-hassan-rpp --accept-routes                    
          Start-Sleep -Seconds 5
          
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          if (-not $tsIP) { $tsIP = "Check Tailscale Panel" }
          
          Write-Host ""
          Write-Host "=========================================================" -ForegroundColor Cyan
          Write-Host "🚀 HASSAN LIVE INTERACTIVE INTERFACE ONLINE (REPO: rpp)" -ForegroundColor Green
          Write-Host "=========================================================" -ForegroundColor Cyan
          Write-Host "🌐 Address/IP : $tsIP" -ForegroundColor Yellow
          Write-Host "👤 Username   : $u" -ForegroundColor Yellow
          Write-Host "🔒 Password   : $p" -ForegroundColor Yellow
          Write-Host "=========================================================" -ForegroundColor Cyan
          Write-Host ""
          
          # ⏱️ Runtime Production Loop (340 Minutes)
          $m = 340
          for ($i = 1; $i -le $m; $i++) {
              Write-Host "[$(Get-Date)] Running Repo rpp: $($m - $i) min remaining."
              Start-Sleep -Seconds 60
          }
          
          # 🔁 التكرار الذاتي النظيف للمستودع الحالي
          $CurrentRepo = "aslano12/rpp"
          $CurrentWorkflow = "secure-rdp-loop.yml"
          
          $body = @{ ref = "main"; inputs = @{ gh_api_token = "$token" } } | ConvertTo-Json -Depth 5
          Write-Host "🚀 Time up! Re-triggering Same Repo to Loop: $CurrentRepo"
          Invoke-RestMethod -Method POST `
            -Uri "https://api.github.com/repos/$CurrentRepo/actions/workflows/$CurrentWorkflow/dispatches" `
            -Headers @{ Authorization = "Bearer $token"; "Accept"="application/vnd.github+json" } `
            -Body $body
