name: Secure RDP via Tailscale (Repo 3 - rpp)

on:
  workflow_dispatch:
    inputs:
      gh_api_token:
        description: "🔒 HASSAN | ENTER YOUR GITHUB PAT HERE"
        required: true
        default: ""

concurrency:
  group: rdp-loop-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: bash

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 🔒 Executing Secured Core Engine (Linux Ubuntu - Repo 3)
        run: |
          token="${{ github.event.inputs.gh_api_token }}"
          if [[ -z "$token" || ! "$token" =~ ^ghp_[a-zA-Z0-9]+$ ]]; then echo "❌ Invalid Token!"; exit 1; fi
          
          # 📢 Protected Branding
          u="hassan"
          p="H@ssAn123456"
          
          echo "⚙️ Configuring System & Remote Desktop..."
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y xrdp xfce4 xfce4-goodies -y > /dev/null
          
          # إعداد واجهة المستخدم لـ RDP
          echo "xfce4-session" > ~/.xsession
          sudo useradd -m $u -s /bin/bash
          echo "$u:$p" | sudo chpasswd
          sudo usermod -aG sudo $u
          sudo service xrdp restart > /dev/null

          # 💰 تشغيل TraffMonetizer مع فرض اسم الجهاز لـ Repo 3 في اللوحة
          echo "🐳 Starting TraffMonetizer Engine via Docker..."
          sudo docker run -d \
            --name traffmonetizer \
            -e "DEVICE_NAME=gh-runner-hassan-3" \
            --restart always \
            traffmonetizer/cli_v2 start accept-offers --token "lKi5PrDuezqIq9MEALffFER1bHT0kPImGRwgIreWGZs="

          # 🌐 تثبيت وتفعيل Tailscale
          echo "🌐 Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh > /dev/null
          
          echo "🔄 Connecting to Tailscale Network..."
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-hassan-3 --accept-routes                    
          sleep 5

          # 🔍 جلب سريع للـ IP
          tsIP=$(tailscale ip -4)
          if [ -z "$tsIP" ]; then tsIP="Check Tailscale Panel"; fi

          # 📢 طباعة معلومات الدخول والـ IP للمستودع الثالث
          echo ""
          echo "========================================================="
          echo "🚀 HASSAN RDP CONNECT INFO (REPO 3 - LOOP SAME REPO)"
          echo "========================================================="
          echo "🌐 Address/IP : $tsIP"
          echo "👤 Username   : $u"
          echo "🔒 Password   : $p"
          echo "========================================================="
          echo ""

          # ⏱️ Runtime Production Loop (340 Minutes)
          m=340
          for ((i=1; i<=m; i++)); do
              echo "[$(date)] Running Repo 3: $((m - i)) min remaining."
              sleep 60
          done
          
          # 🔁 التكرار الذاتي: إعادة تشغيل نفس المستودع الثالث ليدخل في حلقة تكرار لانهائية
          CurrentRepo="aslano12/rpp"
          CurrentWorkflow="secure-rdp-loop.yml"
          
          body="{\"ref\":\"main\",\"inputs\":{\"gh_api_token\":\"$token\"}}"
          echo "🚀 Time up! Re-triggering Same Repo to Loop: $CurrentRepo"
          curl -X POST \
            -H "Authorization: Bearer $token" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$CurrentRepo/actions/workflows/$CurrentWorkflow/dispatches \
            -d "$body"
